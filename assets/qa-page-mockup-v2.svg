<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960">
  <defs>
    <pattern id="benday-btn" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.2" fill="#1C1C1C" opacity="0.25"/>
    </pattern>
    <pattern id="benday-nav" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.2" fill="#1C1C1C" opacity="0.15"/>
    </pattern>
    <pattern id="benday-yellow" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#1C1C1C" opacity="0.2"/>
    </pattern>
    <filter id="hard-shadow">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#1C1C1C" flood-opacity="1"/>
    </filter>
    <filter id="hard-shadow-sm">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#1C1C1C" flood-opacity="1"/>
    </filter>
    <style>
      .title { font: 800 30px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #1C1C1C; letter-spacing: -0.5px; }
      .h2 { font: 800 18px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #1C1C1C; letter-spacing: -0.2px; }
      .h3 { font: 700 15px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #1C1C1C; letter-spacing: -0.1px; }
      .body { font: 500 14px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #3D3D3D; letter-spacing: 0; }
      .small { font: 600 11px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #555; letter-spacing: 0; }
      .mono { font: 600 12px "Cascadia Mono", "Consolas", monospace; fill: #3D3D3D; letter-spacing: 0; }
      .nav { font: 700 14px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #3D3D3D; letter-spacing: 0; text-transform: uppercase; }
      .nav-active { font: 700 14px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #1C1C1C; letter-spacing: 0; text-transform: uppercase; }
      .btn-text { font: 800 13px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #FFFFFF; letter-spacing: 0.5px; }
      .logo-text { font: 800 18px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #1C1C1C; letter-spacing: -0.3px; }
      .source-title { font: 700 14px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #1C1C1C; }
    </style>
  </defs>

  <rect width="1440" height="960" fill="#F9F6F0"/>
  <rect x="32" y="24" width="1376" height="912" fill="#FFFFFF" stroke="#1C1C1C" stroke-width="3" filter="url(#hard-shadow)"/>
  <rect x="32" y="24" width="232" height="912" fill="#F5F1EA" stroke="#1C1C1C" stroke-width="3"/>

  <g transform="rotate(30, 84, 95)">
    <circle cx="84" cy="95" r="21" fill="#FF2D20" stroke="#1C1C1C" stroke-width="3"/>
    <circle cx="100" cy="81" r="13" fill="#2C5F8A" stroke="#1C1C1C" stroke-width="3"/>
    <circle cx="68" cy="81" r="10" fill="#F0C050" stroke="#1C1C1C" stroke-width="3"/>
  </g>
  <text x="124" y="88" class="logo-text">Codex RAG</text>
  <text x="124" y="106" class="small">KNOWLEDGE WORKSPACE</text>

  <text x="96" y="178" class="nav">知识库</text>
  <text x="96" y="234" class="nav">上传文档</text>
  <rect x="60" y="266" width="176" height="44" fill="#F0C050" stroke="#1C1C1C" stroke-width="3" filter="url(#hard-shadow-sm)"/>
  <rect x="60" y="266" width="176" height="44" fill="url(#benday-yellow)"/>
  <text x="80" y="294" class="nav-active">智能问答</text>
  <text x="96" y="350" class="nav">历史记录</text>

  <rect x="60" y="840" width="176" height="60" fill="#FFFFFF" stroke="#1C1C1C" stroke-width="3" filter="url(#hard-shadow-sm)"/>
  <rect x="80" y="858" width="24" height="24" fill="#2C5F8A" stroke="#1C1C1C" stroke-width="2"/>
  <text x="92" y="875" font-family="Inter, sans-serif" font-size="10" font-weight="800" fill="#FFF" text-anchor="middle">A</text>
  <text x="116" y="870" class="h3" font-size="13">admin</text>
  <text x="116" y="887" class="small">ONLINE</text>

  <text x="326" y="88" class="title">智能问答</text>
  <text x="326" y="116" class="body">从知识库检索上下文，再调用模型生成回答</text>

  <rect x="1204" y="74" width="78" height="38" fill="#FFFFFF" stroke="#1C1C1C" stroke-width="3" filter="url(#hard-shadow-sm)"/>
  <text x="1218" y="98" class="small" font-size="12">清空</text>

  <rect x="326" y="160" width="780" height="620" fill="#FFFFFF" stroke="#1C1C1C" stroke-width="3" filter="url(#hard-shadow-sm)"/>

  <rect x="356" y="192" width="470" height="70" fill="#F5F1EA" stroke="#1C1C1C" stroke-width="3"/>
  <text x="376" y="220" class="h3" font-size="12">用户</text>
  <text x="376" y="246" class="body">什么是 RAG？它的工作流程是怎样的？</text>
  <text x="740" y="220" class="small">14:35</text>

  <rect x="356" y="288" width="630" height="228" fill="#FAF8F5" stroke="#1C1C1C" stroke-width="3"/>
  <rect x="356" y="288" width="5" height="228" fill="#E85D4A"/>
  <text x="376" y="318" class="h3">助手</text>
  <text x="376" y="348" class="body">RAG 是一种检索增强生成技术。系统先从外部知识库检索相关内容，</text>
  <text x="376" y="372" class="body">再将这些上下文传入模型生成答案，从而减少幻觉并提升可追溯性。</text>
  <text x="376" y="406" class="body" font-weight="800">1. 接收用户问题</text>
  <text x="376" y="428" class="body" font-weight="800">2. 将问题向量化并检索相关文档</text>
  <text x="376" y="450" class="body" font-weight="800">3. 把相关片段交给模型生成回答</text>
  <text x="376" y="472" class="body" font-weight="800">4. 返回答案并提供来源引用</text>
  <line x1="376" y1="492" x2="966" y2="492" stroke="#1C1C1C" stroke-width="2"/>
  <text x="376" y="510" class="mono">引用来源 4 →</text>

  <rect x="356" y="730" width="734" height="56" fill="#FFFFFF" stroke="#1C1C1C" stroke-width="3"/>
  <text x="380" y="764" class="body" fill="#999">输入你的问题...</text>
  <rect x="1020" y="740" width="54" height="36" fill="#E85D4A" stroke="#1C1C1C" stroke-width="2.5" filter="url(#hard-shadow-sm)"/>
  <rect x="1020" y="740" width="54" height="36" fill="url(#benday-btn)"/>
  <text x="1036" y="763" class="btn-text" font-size="18">→</text>
  <text x="356" y="806" class="small">Enter 发送，Shift + Enter 换行</text>

  <rect x="1134" y="160" width="260" height="620" fill="#FFFFFF" stroke="#1C1C1C" stroke-width="3" filter="url(#hard-shadow-sm)"/>
  <text x="1162" y="202" class="h2">SOURCES</text>

  <rect x="1162" y="228" width="204" height="82" fill="#FAF8F5" stroke="#1C1C1C" stroke-width="2.5"/>
  <text x="1182" y="254" class="source-title">需求说明.pdf</text>
  <text x="1182" y="276" class="mono">chunk_12</text>
  <text x="1182" y="296" class="small">支持上传 .pdf、.docx...</text>
  <rect x="1182" y="254" width="30" height="20" fill="#FCE8E5" stroke="#1C1C1C" stroke-width="1.5"/>
  <text x="1190" y="268" font-family="Inter" font-size="9" font-weight="800" fill="#E85D4A">PDF</text>

  <rect x="1162" y="330" width="204" height="82" fill="#FAF8F5" stroke="#1C1C1C" stroke-width="2.5"/>
  <text x="1182" y="356" class="source-title">产品知识库.md</text>
  <text x="1182" y="378" class="mono">chunk_4</text>
  <text x="1182" y="398" class="small">解析后将被切割...</text>
  <rect x="1182" y="356" width="30" height="20" fill="#F0ECE5" stroke="#1C1C1C" stroke-width="1.5"/>
  <text x="1190" y="370" font-family="Inter" font-size="9" font-weight="800" fill="#3D3D3D">MD</text>

  <rect x="1162" y="432" width="204" height="82" fill="#FAF8F5" stroke="#1C1C1C" stroke-width="2.5"/>
  <text x="1182" y="458" class="source-title">会议纪要.txt</text>
  <text x="1182" y="480" class="mono">chunk_2</text>
  <text x="1182" y="500" class="small">调用 DeepSeek API...</text>
  <rect x="1182" y="458" width="30" height="20" fill="#F0ECE5" stroke="#1C1C1C" stroke-width="1.5"/>
  <text x="1190" y="472" font-family="Inter" font-size="9" font-weight="800" fill="#3D3D3D">TXT</text>

  <rect x="1162" y="534" width="204" height="82" fill="#FAF8F5" stroke="#1C1C1C" stroke-width="2.5"/>
  <text x="1182" y="560" class="source-title">LangChain.md</text>
  <text x="1182" y="582" class="mono">chunk_7</text>
  <text x="1182" y="602" class="small">检索 + 生成架构...</text>
  <rect x="1182" y="560" width="30" height="20" fill="#F0ECE5" stroke="#1C1C1C" stroke-width="1.5"/>
  <text x="1190" y="574" font-family="Inter" font-size="9" font-weight="800" fill="#3D3D3D">MD</text>
</svg>
