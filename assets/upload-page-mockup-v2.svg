  <rect x="1112" y="422" width="252" height="62" fill="#FAF8F5" stroke="#1C1C1C" stroke-width="2"/>
  <rect x="1112" y="440" width="28" height="20" fill="#F0ECE5" stroke="#1C1C1C" stroke-width="1.5"/>
  <text x="1120" y="454" font-family="Inter" font-size="8" font-weight="800" fill="#3D3D3D">TXT</text>
  <text x="1152" y="452" class="upload-name">会议纪要.txt</text>
  <text x="1152" y="470" class="small">0.1 MB</text>
  <text x="1316" y="452" class="small" fill="#999" font-weight="800">等待中</text>

  <rect x="1112" y="498" width="252" height="62" fill="#FAF8F5" stroke="#1C1C1C" stroke-width="2"/>
  <rect x="1112" y="516" width="28" height="20" fill="#E4ECF5" stroke="#1C1C1C" stroke-width="1.5"/>
  <text x="1119" y="530" font-family="Inter" font-size="8" font-weight="800" fill="#2C5F8A">DOCX</text>
  <text x="1152" y="528" class="upload-name">技术方案.docx</text>
