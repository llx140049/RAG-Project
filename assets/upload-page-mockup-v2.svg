  <rect x="1130" y="294" width="140" height="8" fill="#E85D4A"/>
  <text x="1342" y="264" class="small" fill="#E85D4A" font-weight="800">65%</text>

  <rect x="1112" y="326" width="252" height="82" fill="#FAF8F5" stroke="#1C1C1C" stroke-width="2"/>
  <rect x="1112" y="348" width="28" height="20" fill="#F0ECE5" stroke="#1C1C1C" stroke-width="1.5"/>
  <text x="1120" y="362" font-family="Inter" font-size="8" font-weight="800" fill="#3D3D3D">MD</text>
  <text x="1152" y="360" class="upload-name">产品知识库.md</text>
  <text x="1152" y="378" class="small">0.5 MB</text>
  <rect x="1130" y="390" width="216" height="8" fill="#4A8C6F"/>
