<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960">
  <defs>
    <pattern id="benday-btn" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.2" fill="#1C1C1C" opacity="0.25"/>
    </pattern>
    <pattern id="benday-yellow" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#1C1C1C" opacity="0.2"/>
    </pattern>
    <filter id="hard-shadow">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#1C1C1C" flood-opacity="1"/>
    </filter>
    <filter id="hard-shadow-sm">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#1C1C1C" flood-opacity="1"/>
    </filter>
    <style>
      .title { font: 800 30px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #1C1C1C; letter-spacing: -0.5px; }
      .h3 { font: 700 15px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #1C1C1C; letter-spacing: -0.1px; }
      .body { font: 500 14px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #3D3D3D; letter-spacing: 0; }
      .small { font: 600 11px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #555; letter-spacing: 0; }
      .mono { font: 600 12px "Cascadia Mono", "Consolas", monospace; fill: #3D3D3D; letter-spacing: 0; }
      .nav { font: 700 14px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #3D3D3D; letter-spacing: 0; text-transform: uppercase; }
      .nav-active { font: 700 14px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #1C1C1C; letter-spacing: 0; text-transform: uppercase; }
      .logo-text { font: 800 18px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #1C1C1C; letter-spacing: -0.3px; }
    </style>
  </defs>

  <rect width="1440" height="960" fill="#F9F6F0"/>
  <rect x="32" y="24" width="1376" height="912" fill="#FFFFFF" stroke="#1C1C1C" stroke-width="3" filter="url(#hard-shadow)"/>
  <rect x="32" y="24" width="232" height="912" fill="#F5F1EA" stroke="#1C1C1C" stroke-width="3"/>

  <g transform="rotate(30, 84, 95)">
    <circle cx="84" cy="95" r="21" fill="#FF2D20" stroke="#1C1C1C" stroke-width="3"/>
    <circle cx="100" cy="81" r="13" fill="#2C5F8A" stroke="#1C1C1C" stroke-width="3"/>
    <circle cx="68" cy="81" r="10" fill="#F0C050" stroke="#1C1C1C" stroke-width="3"/>
  </g>
  <text x="124" y="88" class="logo-text">Codex RAG</text>
  <text x="124" y="106" class="small">KNOWLEDGE WORKSPACE</text>

  <text x="96" y="178" class="nav">知识库</text>
  <text x="96" y="234" class="nav">上传文档</text>
  <text x="96" y="290" class="nav">智能问答</text>
  <rect x="60" y="324" width="176" height="44" fill="#F0C050" stroke="#1C1C1C" stroke-width="3" filter="url(#hard-shadow-sm)"/>
  <rect x="60" y="324" width="176" height="44" fill="url(#benday-yellow)"/>
  <text x="80" y="352" class="nav-active">历史记录</text>

  <rect x="60" y="840" width="176" height="60" fill="#FFFFFF" stroke="#1C1C1C" stroke-width="3" filter="url(#hard-shadow-sm)"/>
  <rect x="80" y="858" width="24" height="24" fill="#2C5F8A" stroke="#1C1C1C" stroke-width="2"/>
  <text x="92" y="875" font-family="Inter" font-size="10" font-weight="800" fill="#FFF" text-anchor="middle">A</text>
  <text x="116" y="870" class="h3" font-size="13">admin</text>
  <text x="116" y="887" class="small">ONLINE</text>

  <text x="326" y="88" class="title">历史记录</text>
  <text x="326" y="116" class="body">问答记录列表。当前后端已有模型，接口待接入</text>

  <rect x="326" y="160" width="810" height="48" fill="#FFFFFF" stroke="#1C1C1C" stroke-width="3"/>
  <text x="354" y="190" class="body" fill="#999">搜索历史问题或答案...</text>
  <rect x="1164" y="160" width="106" height="48" fill="#FFFFFF" stroke="#1C1C1C" stroke-width="3" filter="url(#hard-shadow-sm)"/>
  <text x="1190" y="190" class="body" font-weight="700">全部 ▾</text>
  <rect x="1282" y="160" width="48" height="48" fill="#FFFFFF" stroke="#1C1C1C" stroke-width="3" filter="url(#hard-shadow-sm)"/>
  <text x="1296" y="190" class="body">📅</text>

  <rect x="326" y="234" width="1074" height="120" fill="#FFFFFF" stroke="#1C1C1C" stroke-width="3" filter="url(#hard-shadow-sm)"/>
  <rect x="326" y="234" width="5" height="120" fill="#E85D4A"/>
  <text x="358" y="266" class="h3">这个项目目前支持哪些文档格式？</text>
  <text x="358" y="294" class="body">支持 PDF、DOCX、TXT 和 Markdown 文档。</text>
  <text x="358" y="328" class="mono">sources: 5 · 2026/05/11 13:20</text>
  <rect x="1250" y="276" width="120" height="30" fill="#F5F1EA" stroke="#1C1C1C" stroke-width="2.5"/>
  <text x="1280" y="296" class="mono">查看详情 →</text>

  <rect x="326" y="380" width="1074" height="120" fill="#FFFFFF" stroke="#1C1C1C" stroke-width="3" filter="url(#hard-shadow-sm)"/>
  <rect x="326" y="380" width="5" height="120" fill="#2C5F8A"/>
  <text x="358" y="412" class="h3">文档上传后会做什么处理？</text>
  <text x="358" y="440" class="body">保存文件、解析文本、切块、生成 embedding、写入 ChromaDB。</text>
  <text x="358" y="474" class="mono">sources: 4 · 2026/05/11 12:42</text>
  <rect x="1250" y="422" width="120" height="30" fill="#F5F1EA" stroke="#1C1C1C" stroke-width="2.5"/>
  <text x="1280" y="442" class="mono">查看详情 →</text>

  <rect x="326" y="526" width="1074" height="120" fill="#FFFFFF" stroke="#1C1C1C" stroke-width="3" filter="url(#hard-shadow-sm)"/>
  <rect x="326" y="526" width="5" height="120" fill="#F0C050"/>
  <text x="358" y="558" class="h3">系统如何区分不同用户的知识库？</text>
  <text x="358" y="586" class="body">每个用户使用独立 collection，例如 user_7。</text>
  <text x="358" y="620" class="mono">sources: 3 · 2026/05/10 18:06</text>
  <rect x="1250" y="568" width="120" height="30" fill="#F5F1EA" stroke="#1C1C1C" stroke-width="2.5"/>
  <text x="1280" y="588" class="mono">查看详情 →</text>

  <rect x="326" y="690" width="1074" height="54" fill="#FFF8E6" stroke="#1C1C1C" stroke-width="2.5"/>
  <text x="358" y="722" class="body" fill="#8C7020" font-weight="700">History 表已存在；保存和查询接口还未实现。</text>
</svg>
